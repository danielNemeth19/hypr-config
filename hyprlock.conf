background {
    monitor =
    path = ~/.config/wallpapers/cat_leaves.png
}

input-field {
    monitor =
    size = 220, 54
    outline_thickness = 4
    dots_size = 0.4
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(a6adc8)
    inner_color = rgb(1e1e2e)
    font_color = rgb(a6adc8)
    fade_on_empty = true
    fade_timeout = 1200
    placeholder_text = <i>Enter your password...</i>
    hide_input = false
    rounding = 16
    check_color = rgb(34, 204, 136)
    fail_color = rgb(204, 34, 34)
    fail_text = <b>Authentication failed</b> <i>($ATTEMPTS tries)</i>
    fail_transition = 180
    capslock_color = rgb(f9e2af)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -30
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
    color = rgba(a6adc8)
    font_size = 60
    font_family = Fira Semibold
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 6
    shadow_size = 12
}

label {
    monitor =
    text = <b>Welcome back!</b>
    color = rgba(a6adc8)
    font_size = 28
    font_family = Fira Semibold
    position = 0, -180
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 8
}

label {
    monitor =
    text = cmd[update:30] echo "<b>Battery:</b> $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null)%"
    color = rgba(a6adc8)
    font_size = 18
    font_family = Fira Semibold
    position = 0, -250
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

image {
    monitor =
    path = ~/.config/wallpapers/cat_leaves.png
    size = 220
    rounding = 110
    border_size = 4
    border_color = rgb(a6adc8)
    rotate = 0
    reload_time = -1
    position = 0, 120
    halign = center
    valign = center
}
